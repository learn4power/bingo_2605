<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>優勢賓果：那些我在報稅期間做的事</title>
<meta property="og:title" content="報稅期間你做的事，很可能就是你的優勢！">
<meta property="og:description" content="每個你在報稅期間的行為，背後都藏著你獨特的性格優勢。來玩優勢賓果，翻牌看看你是哪種人！">
<meta property="og:image" content="http://learn4power.com/wp-content/uploads/2024/10/cropped-學次方logo-01-1.png">
<meta property="og:url" content="https://learn4power.github.io/bingo_2605/">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --amber-light: #FAEEDA; --amber-dark: #633806;
  --bg: #FAF9F7; --card-bg: #FFFFFF;
  --text: #1A1A1A; --text-muted: #6B6B6B;
  --border: rgba(0,0,0,0.1); --radius: 10px;
}
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0; }
.game-wrapper { max-width: 680px; margin: 0 auto; padding: 2rem 1rem 3rem; }
.header { text-align: center; margin-bottom: 1.8rem; }
.header-badge { display: inline-block; background: var(--amber-light); color: var(--amber-dark); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; }
.header h1 { font-family: 'Noto Serif TC', serif; font-size: clamp(20px, 5vw, 28px); font-weight: 700; line-height: 1.4; margin-bottom: 8px; }
.header p { font-size: 13px; color: var(--text-muted); line-height: 1.7; }
.phase-bar { display: flex; align-items: center; gap: 8px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: 12px; color: var(--text-muted); }
.phase-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; background: #f4bfe7; color: #7a3a6a; }
#phase-text { font-weight: 500; color: var(--text); }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-bottom: 1.2rem; }
.cell { aspect-ratio: 1; perspective: 700px; cursor: pointer; }
.cell-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); border-radius: var(--radius); }
.cell.flipped .cell-inner { transform: rotateY(180deg); }
.face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: var(--radius); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 7px 5px; text-align: center; border: 1.5px solid var(--border); }
.face-front { background: var(--card-bg); color: var(--text); font-size: clamp(10px, 1.8vw, 13px); line-height: 1.4; gap: 5px; }
.face-back { background: #589596; color: #fff; font-size: clamp(9px, 1.7vw, 12px); line-height: 1.2; gap: 2px; transform: rotateY(180deg); padding: 4px; }
.cell:hover .face-front { border-color: #426e6f; box-shadow: 0 0 0 2px rgba(66,110,111,0.15); }
.cell.selected .face-front { background: #b1d1cf; border-color: #7fb8b6; }
.cell.hidden { opacity: 0; pointer-events: none; transform: scale(0.8); transition: opacity 0.35s, transform 0.35s; }
.check-ring { width: 20px; height: 20px; border-radius: 50%; background: #426e6f; display: none; align-items: center; justify-content: center; flex-shrink: 0; }
.cell.selected .check-ring { display: flex; }
.check-ring svg { width: 11px; height: 11px; stroke: white; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.back-str-a { font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: clamp(10px, 1.8vw, 13px); color: #fff; }
.back-reason { font-size: clamp(8px, 1.4vw, 10px); color: rgba(255,255,255,0.85); }
.back-divider { width: 50%; border: none; border-top: 1px solid rgba(255,255,255,0.3); margin: 2px 0; }
.back-str-b { font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: clamp(9px, 1.6vw, 12px); color: rgba(255,255,255,0.9); }
.controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.btn { font-family: 'Noto Sans TC', sans-serif; font-size: 13px; font-weight: 500; padding: 9px 20px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--card-bg); color: var(--text); cursor: pointer; transition: background 0.2s, border-color 0.2s, transform 0.1s; white-space: nowrap; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: #426e6f; color: white; border-color: #2f4f50; }
.btn-primary:hover { background: #2f4f50; }
.btn-reset { background: transparent; color: var(--text-muted); border-color: transparent; font-size: 12px; padding: 9px 12px; }
.btn-reset:hover { background: #F5F4F0; color: var(--text); }
.btn-share { background: #426e6f; color: white; border-color: #2f4f50; padding: 10px 22px; }
.btn-share:hover { background: #2f4f50; }
.count-label { margin-left: auto; font-size: 12px; color: var(--text-muted); }
.hint { font-size: 11.5px; color: var(--text-muted); margin-top: 10px; text-align: center; min-height: 18px; line-height: 1.5; }
.share-area { display: none; text-align: center; margin-top: 1.5rem; }
.share-label { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
.share-btns { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
@media (max-width: 480px) {
  .game-wrapper { padding: 1.2rem 0.6rem 2rem; }
  .grid { gap: 5px; }
  .face { padding: 5px 3px; }
}
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="header">
    <div class="header-badge">五月大事 × 優勢賓果</div>
    <h1>那些我在報稅期間做的事</h1>
    <p>每個你在報稅期間的行為，<br>背後都藏著你獨特的性格優勢。</p>
  </div>
  <div class="phase-bar">
    <div class="phase-icon" id="phaseIcon">1</div>
    <span id="phase-text">選行為：點選你會出現的行為格子</span>
  </div>
  <div class="grid" id="grid"></div>
  <div class="controls">
    <button class="btn btn-primary" id="confirmBtn">確認選擇 →</button>
    <button class="btn btn-reset" id="resetBtn">再選一次</button>
    <span class="count-label" id="countLabel">已選 0 格</span>
  </div>
  <p class="hint" id="hint">點選「確認選擇」，卡片即會翻面，顯示行為對應的優勢</p>
  <div class="share-area" id="shareArea">
    <p class="share-label">分享你的結果</p>
    <div class="share-btns">
      <button class="btn btn-share" id="shareFB">Facebook</button>
      <button class="btn btn-share" id="shareLINE">LINE</button>
    </div>
  </div>
</div>

<script>
var DATA = [
  { action:"早早整理好單據，5/1 準時申報", sa:"自律", ra:"習慣建立秩序，不讓任務堆積。", sb:"審慎", rb:"預留緩衝，避免最後一刻出錯。" },
  { action:"幫家人或科技苦手申報稅務", sa:"仁慈", ra:"純粹想幫他人減輕負擔的善意。", sb:"領導力", rb:"享受組織並帶領他人完成任務。" },
  { action:"徹底研究節稅條文與法規細節", sa:"好奇心", ra:"對稅制如何運作充滿探索興趣。", sb:"學習力", rb:"享受掌握專業知識帶來的滿足感。" },
  { action:"算出最精省的申報組合，省下每一分錢", sa:"判斷力", ra:"理性分析數據，做出最優決策。", sb:"創造力", rb:"把節稅當作一場益智遊戲在破關。" },
  { action:"邊報稅邊感嘆這筆錢能帶來的社會貢獻", sa:"靈性", ra:"看見個人支出與社會共好的連結。", sb:"公民精神", rb:"認同身為公民的集體責任與貢獻。" },
  { action:"雖然稅金痛，但仍感謝自己有能力賺錢", sa:"感恩", ra:"專注於擁有的收入而非失去的現金。", sb:"希望", rb:"相信支出會換來未來更好的公共環境。" },
  { action:"遇到系統大當機或卡關，仍能冷靜等待", sa:"自我調節", ra:"掌控焦慮，不讓外在干擾心情。", sb:"寬恕", rb:"包容系統的失誤，不輕易產生怨氣。" },
  { action:"在社群發文，自嘲「國庫需要我」", sa:"幽默", ra:"用笑聲轉化繳稅的痛感，帶動氣氛。", sb:"社交智慧", rb:"懂得用大眾共鳴話題與人連結。" },
  { action:"報稅後認真檢視消費，反省人生與價值", sa:"透視力", ra:"能從金錢流向中看清什麼最重要。", sb:"誠實", rb:"誠實面對自己的欲望與財務現狀。" },
  { action:"不管法條多枯燥，堅持一定要讀到懂", sa:"喜愛學習", ra:"即使是生硬內容也能沉浸學習。", sb:"毅力", rb:"面對繁瑣流程，有不達目的不罷休的韌性。" },
  { action:"報稅完買個好東西，儀式感獎勵自己", sa:"欣賞美與卓越", ra:"看見生活美感並懂得享受。", sb:"勇氣", rb:"有膽量決定如何支配辛苦賺來的錢。" },
  { action:"雖然抱怨制度，但仍堅持誠實合法申報", sa:"公平", ra:"堅持每個人都應遵守同樣的規範。", sb:"誠實", rb:"內在道德標準極高，追求真實行為。" },
  { action:"報稅期限最後一小時，才是我申報的時間", sa:"熱情", ra:"在極限邊緣發揮爆發力，活得有張力。", sb:"勇敢", rb:"不畏懼壓力，能在危急時刻保持行動。" },
  { action:"引導焦慮的家人完成繁瑣步驟", sa:"領導力", ra:"在混亂中指引方向，讓大家安心。", sb:"謙虛", rb:"不誇大自己的付出，默默解決問題。" },
  { action:"對稅務人員或客服保持禮貌、客氣詢問", sa:"謙虛", ra:"尊重專業，不因身為納稅人而自大。", sb:"社交智慧", rb:"知道友善溝通是解決問題的捷徑。" },
  { action:"與另一半討論報稅後的家庭財務願景", sa:"愛", ra:"將財務視為維護家庭關係的重要基石。", sb:"希望", rb:"對共同構建的未來藍圖充滿美好憧憬。" }
];

var phase = 'select';
var selected = new Set();
var flipped = new Set();

var grid = document.getElementById('grid');
var confirmBtn = document.getElementById('confirmBtn');
var resetBtn = document.getElementById('resetBtn');
var countLabel = document.getElementById('countLabel');
var phaseText = document.getElementById('phase-text');
var phaseIcon = document.getElementById('phaseIcon');
var hint = document.getElementById('hint');
var shareArea = document.getElementById('shareArea');
var shareFB = document.getElementById('shareFB');
var shareLINE = document.getElementById('shareLINE');

function buildGrid() {
  grid.innerHTML = '';
  for (var i = 0; i < DATA.length; i++) {
    (function(idx) {
      var d = DATA[idx];
      var cell = document.createElement('div');
      cell.className = 'cell' + (selected.has(idx) ? ' selected' : '');
      cell.innerHTML =
        '<div class="cell-inner">' +
          '<div class="face face-front">' +
            '<span class="check-ring"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></span>' +
            '<span>' + d.action + '</span>' +
          '</div>' +
          '<div class="face face-back">' +
            '<span class="back-str-a">' + d.sa + '</span>' +
            '<span class="back-reason">' + d.ra + '</span>' +
            '<hr class="back-divider">' +
            '<span class="back-str-b">' + d.sb + '</span>' +
            '<span class="back-reason">' + d.rb + '</span>' +
          '</div>' +
        '</div>';
      cell.addEventListener('click', function() { onCellClick(idx); });
      grid.appendChild(cell);
    })(i);
  }
}

function onCellClick(i) {
  var cell = grid.children[i];
  if (phase === 'select') {
    if (selected.has(i)) {
      selected.delete(i);
      cell.classList.remove('selected');
    } else {
      selected.add(i);
      cell.classList.add('selected');
    }
    countLabel.textContent = '已選 ' + selected.size + ' 格';
  } else if (phase === 'flip') {
    if (!selected.has(i)) return;
    if (flipped.has(i)) {
      flipped.delete(i);
      cell.classList.remove('flipped');
    } else {
      flipped.add(i);
      cell.classList.add('flipped');
    }
  }
}

confirmBtn.addEventListener('click', function() {
  if (phase === 'select') {
    phase = 'flip';
    for (var i = 0; i < DATA.length; i++) {
      if (!selected.has(i)) grid.children[i].classList.add('hidden');
    }
    confirmBtn.textContent = '全部翻回正面';
    phaseText.textContent = '看看優勢：點選格子，卡片即會翻面，顯示行為對應的優勢';
    phaseIcon.textContent = '2';
    hint.textContent = '再點一次即可翻回正面';
    shareArea.style.display = 'block';
  } else {
    flipped.forEach(function(i) { grid.children[i].classList.remove('flipped'); });
    flipped.clear();
    hint.textContent = '已全部翻回正面，點個別格子再翻一次';
  }
});

shareFB.addEventListener('click', function() {
  window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(location.href), '_blank');
});

shareLINE.addEventListener('click', function() {
  var lines = ['【學次方 X 報稅理財優勢賓果】我選了 ' + selected.size + ' 個行為！'];
  selected.forEach(function(i) {
    lines.push('・' + DATA[i].action + '（' + DATA[i].sa + '／' + DATA[i].sb + '）');
  });
  lines.push('來玩看看你是哪種人 👉 https://learn4power.github.io/bingo_2605/');
  var text = lines.join('%0A');
  window.open('https://line.me/R/share?text=' + text, '_blank');
});

resetBtn.addEventListener('click', function() {
  phase = 'select';
  selected = new Set();
  flipped = new Set();
  phaseText.textContent = '選行為：點選你會出現的行為格子';
  phaseIcon.textContent = '1';
  confirmBtn.textContent = '確認選擇 →';
  hint.textContent = '點選「確認選擇」，卡片即會翻面，顯示行為對應的優勢';
  countLabel.textContent = '已選 0 格';
  shareArea.style.display = 'none';
  buildGrid();
});

buildGrid();
</script>
</body>
</html>
