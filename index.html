<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五月賓果：報稅理財的優勢大盤點</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple-light: #EEEDFE;
    --purple-mid: #7F77DD;
    --purple-dark: #3C3489;
    --teal-light: #E1F5EE;
    --teal-mid: #1D9E75;
    --teal-dark: #085041;
    --amber-light: #FAEEDA;
    --amber-mid: #EF9F27;
    --amber-dark: #633806;
    --bg: #FAF9F7;
    --card-bg: #FFFFFF;
    --text: #1A1A1A;
    --text-muted: #6B6B6B;
    --border: rgba(0,0,0,0.1);
    --radius: 10px;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  .game-wrapper {
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 1rem 3rem;
  }

  .header {
    text-align: center;
    margin-bottom: 1.8rem;
  }

  .header-badge {
    display: inline-block;
    background: var(--amber-light);
    color: var(--amber-dark);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 10px;
  }

  .header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(20px, 5vw, 28px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 8px;
  }

  .header p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.7;
  }

  .phase-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 14px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .phase-icon {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    background: var(--purple-light);
    color: var(--purple-dark);
    transition: background 0.3s, color 0.3s;
  }

  .phase-icon.active-flip {
    background: var(--teal-light);
    color: var(--teal-dark);
  }

  #phase-text { font-weight: 500; color: var(--text); }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 7px;
    margin-bottom: 1.2rem;
  }

  .cell {
    aspect-ratio: 1;
    perspective: 700px;
    cursor: pointer;
    position: relative;
  }

  .cell-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: var(--radius);
  }

  .cell.flipped .cell-inner { transform: rotateY(180deg); }

  .face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 7px 5px;
    text-align: center;
    transition: box-shadow 0.2s;
    border: 1.5px solid var(--border);
  }

  .face-front {
    background: var(--card-bg);
    color: var(--text);
    font-size: clamp(9px, 1.8vw, 12px);
    line-height: 1.4;
    gap: 5px;
  }

  .face-back {
    background: #589596;
    color: #ffffff;
    font-size: clamp(8.5px, 1.7vw, 11.5px);
    line-height: 1.35;
    gap: 4px;
    transform: rotateY(180deg);
    padding: 6px 5px;
  }

  .cell:hover .face-front {
    border-color: var(--purple-mid);
    box-shadow: 0 0 0 2px rgba(127, 119, 221, 0.15);
  }

  .cell.selected .face-front {
    background: #b1d1cf;
    border-color: #7fb8b6;
  }

  .cell.free .face-front {
    background: var(--amber-light);
    border-color: var(--amber-mid);
  }

  .cell.hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.8);
    transition: opacity 0.35s, transform 0.35s;
  }

  .check-ring {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--purple-mid);
    display: none;
    align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .cell.selected .check-ring { display: flex; }

  .check-ring svg {
    width: 11px; height: 11px;
    stroke: white;
    stroke-width: 2.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .action-text { font-size: inherit; }

  .free-label {
    font-size: 8.5px;
    color: var(--amber-dark);
    font-weight: 500;
    letter-spacing: 0.05em;
    opacity: 0.7;
  }

  .back-str-a {
    font-family: 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: clamp(10px, 2vw, 13px);
    color: #ffffff;
  }

  .back-reason {
    font-size: clamp(8px, 1.5vw, 10px);
    color: rgba(255,255,255,0.85);
  }

  .back-divider {
    width: 50%;
    border: none;
    border-top: 1px solid rgba(255,255,255,0.3);
    margin: 3px 0;
  }

  .back-str-b {
    font-family: 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: clamp(9px, 1.8vw, 12px);
    color: rgba(255,255,255,0.9);
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 20px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .btn:hover { background: #F0EEF8; border-color: var(--purple-mid); }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--purple-mid);
    color: white;
    border-color: var(--purple-dark);
  }
  .btn-primary:hover { background: var(--purple-dark); border-color: var(--purple-dark); }

  .btn-reset {
    background: transparent;
    color: var(--text-muted);
    border-color: transparent;
    font-size: 12px;
    padding: 9px 12px;
  }
  .btn-reset:hover { background: #F5F4F0; color: var(--text); }

  .count-label {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
  }

  .hint {
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 10px;
    text-align: center;
    min-height: 18px;
    line-height: 1.5;
  }

  .result-banner {
    display: none;
    text-align: center;
    background: var(--teal-light);
    border: 1px solid rgba(29, 158, 117, 0.3);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-top: 1rem;
    font-size: 13px;
    color: var(--teal-dark);
    line-height: 1.7;
  }

  .result-banner.show { display: block; animation: fadeIn 0.4s ease; }
  .result-banner strong { font-family: 'Noto Serif TC', serif; font-size: 16px; display: block; margin-bottom: 4px; }

  .btn-share {
    background: #426e6f;
    color: white;
    border-color: #2f4f50;
    padding: 10px 28px;
    font-size: 14px;
  }
  .btn-share:hover { background: #2f4f50; border-color: #2f4f50; }

  @media (max-width: 480px) {
    .game-wrapper { padding: 1.2rem 0.6rem 2rem; }
    .grid { gap: 5px; }
    .face { padding: 5px 3px; }
  }
</style>
</head>
<body>

<div class="game-wrapper">

  <div class="header">
    <div class="header-badge">VIA 優勢 × 五月賓果</div>
    <h1>報稅理財的優勢大盤點</h1>
    <p>每個讓你崩潰（或感到驕傲）的報稅行為，<br>背後都藏著你獨特的人格優勢。</p>
  </div>

  <div class="phase-bar">
    <div class="phase-icon" id="phaseIcon">1</div>
    <span id="phase-text">選取中：點格子圈選符合自己的行為</span>
  </div>

  <div class="grid" id="grid"></div>

  <div class="controls">
    <button class="btn btn-primary" id="confirmBtn">確認選擇 →</button>
    <button class="btn btn-reset" id="resetBtn">重置</button>
    <span class="count-label" id="countLabel">已選 0 格</span>
  </div>

  <p class="hint" id="hint">點選格子，圈起符合你的行為；確認後翻牌看看你的優勢</p>

  <div id="shareArea" style="display:none; text-align:center; margin-top:1.5rem;">
    <p style="font-size:12px; color:#6B6B6B; margin-bottom:10px;">分享你的結果</p>
    <div style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
      <button class="btn btn-share" id="shareFB">Facebook</button>
      <button class="btn btn-share" id="shareLINE">LINE</button>
      <button class="btn btn-share" id="shareIG">複製給 IG</button>
    </div>
    <p id="igCopied" style="display:none; font-size:11px; color:#426e6f; margin-top:8px;">已複製！開啟 IG 貼上即可分享</p>
  </div>



</div>

<script>
const DATA = [
  { action:"早就整理好單據，5/1 準時申報", sa:"自律", ra:"習慣建立秩序，不讓任務堆積。", sb:"審慎", rb:"預留緩衝，避免最後一刻出錯。" },
  { action:"主動幫家人或科技苦手申報稅務", sa:"仁慈", ra:"純粹想幫他人減輕負擔的善意。", sb:"領導力", rb:"享受組織並帶領他人完成任務。" },
  { action:"上網徹底研究節稅條文與法規細節", sa:"好奇心", ra:"對稅制如何運作充滿探索興趣。", sb:"學習力", rb:"享受掌握專業知識帶來的滿足感。" },
  { action:"算出最精省的申報組合，省下每一分錢", sa:"判斷力", ra:"理性分析數據，做出最優決策。", sb:"創造力", rb:"把節稅當作一場益智遊戲在破關。" },
  { action:"邊報稅邊感嘆這筆錢能帶來的社會貢獻", sa:"靈性", ra:"看見個人支出與社會共好的連結。", sb:"公民精神", rb:"認同身為公民的集體責任與貢獻。" },
  { action:"雖然稅金痛，但仍感謝自己有能力賺錢", sa:"感恩", ra:"專注於擁有的收入而非失去的現金。", sb:"希望", rb:"相信支出會換來未來更好的公共環境。" },
  { action:"遇到系統大當機或卡關，仍能冷靜等待", sa:"自我調節", ra:"掌控焦慮，不讓外在干擾心情。", sb:"寬恕", rb:"包容系統的失誤，不輕易產生怨氣。" },
  { action:"在社群發幽默廢文，自嘲「國庫需要我」", sa:"幽默", ra:"用笑聲轉化繳稅的痛感，帶動氣氛。", sb:"社交智慧", rb:"懂得用大眾共鳴話題與人連結。" },
  { action:"報稅後認真檢視消費，反省人生與價值", sa:"透視力", ra:"能從金錢流向中看清什麼最重要。", sb:"誠實", rb:"誠實面對自己的欲望與財務現狀。" },
  { action:"不管法條多枯燥，堅持一定要讀到懂", sa:"喜愛學習", ra:"即使是生硬內容也能沉浸學習。", sb:"毅力", rb:"面對繁瑣流程，有不達目的不罷休的韌性。" },
  { action:"報稅完買個好東西，儀式感獎勵自己", sa:"欣賞美與卓越", ra:"看見生活美感並懂得享受。", sb:"勇氣", rb:"有膽量決定如何支配辛苦賺來的錢。" },
  { action:"雖然抱怨制度，但仍堅持誠實合法申報", sa:"公平", ra:"堅持每個人都應遵守同樣的規範。", sb:"誠實", rb:"內在道德標準極高，追求真實行為。" },
  { action:"報稅期限最後一小時，才驚險完成申報", sa:"熱情", ra:"在極限邊緣發揮爆發力，活得有張力。", sb:"勇敢", rb:"不畏懼壓力，能在危急時刻保持行動。" },
  { action:"冷靜引導焦慮的家人完成繁瑣步驟", sa:"領導力", ra:"在混亂中指引方向，讓大家安心。", sb:"謙虛", rb:"不誇大自己的付出，默默解決問題。" },
  { action:"對稅務人員或客服保持禮貌、客氣詢問", sa:"謙虛", ra:"尊重專業，不因身為納稅人而自大。", sb:"社交智慧", rb:"知道友善溝通是解決問題的捷徑。" },
  { action:"與另一半討論報稅後的家庭財務願景", sa:"愛", ra:"將財務視為維護家庭關係的重要基石。", sb:"希望", rb:"對共同構建的未來藍圖充滿美好憧憬。" },
];

let phase = 'select';
let selected = new Set();
let flipped = new Set();

const grid = document.getElementById('grid');
const confirmBtn = document.getElementById('confirmBtn');
const resetBtn = document.getElementById('resetBtn');
const countLabel = document.getElementById('countLabel');
const phaseText = document.getElementById('phase-text');
const phaseIcon = document.getElementById('phaseIcon');
const hint = document.getElementById('hint');

const shareArea = document.getElementById('shareArea');
const shareBtn = document.getElementById('shareBtn');
  grid.innerHTML = '';
  DATA.forEach((d, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell' + (d.free ? ' free' : '') + (selected.has(i) ? ' selected' : '');
    cell.dataset.index = i;
    cell.innerHTML = `
      <div class="cell-inner">
        <div class="face face-front">
          <span class="check-ring"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></span>
          <span class="action-text">${d.action}</span>
          ${d.free ? '<span class="free-label">自由位</span>' : ''}
        </div>
        <div class="face face-back">
          <span class="back-str-a">${d.sa}</span>
          <span class="back-reason">${d.ra}</span>
          <hr class="back-divider">
          <span class="back-str-b">${d.sb}</span>
          <span class="back-reason">${d.rb}</span>
        </div>
      </div>`;
    cell.addEventListener('click', () => onCellClick(i));
    grid.appendChild(cell);
  });
}

function onCellClick(i) {
  const cell = grid.children[i];
  if (phase === 'select') {
    if (DATA[i].free) return;
    if (selected.has(i)) {
      selected.delete(i);
      cell.classList.remove('selected');
    } else {
      selected.add(i);
      cell.classList.add('selected');
    }
    const s = selected.size;
    countLabel.textContent = `已選 ${s} 格`;
  } else if (phase === 'flip') {
    if (!selected.has(i)) return;
    if (flipped.has(i)) {
      flipped.delete(i);
      cell.classList.remove('flipped');
    } else {
      flipped.add(i);
      cell.classList.add('flipped');
    }
  }
}



confirmBtn.addEventListener('click', () => {
  if (phase === 'select') {
    phase = 'flip';
    DATA.forEach((d, i) => {
      const cell = grid.children[i];
      if (!selected.has(i)) cell.classList.add('hidden');
    });
    confirmBtn.textContent = '全部翻回正面';
    phaseText.textContent = '翻牌中：點格子查看你的優勢';
    phaseIcon.textContent = '2';
    phaseIcon.classList.add('active-flip');
    hint.textContent = '點選格子翻面看優勢，再點一次翻回正面';
    shareArea.style.display = 'block';
  } else {
    flipped.forEach(i => grid.children[i].classList.remove('flipped'));
    flipped.clear();
    hint.textContent = '已全部翻回正面，點個別格子再翻一次';
  }
});

const shareFB = document.getElementById('shareFB');
const shareLINE = document.getElementById('shareLINE');
const shareIG = document.getElementById('shareIG');
const igCopied = document.getElementById('igCopied');

function getShareText() {
  const actions = [...selected].map(i => `・${DATA[i].action}`).join('\n');
  const strengths = [...selected].map(i => `${DATA[i].sa}、${DATA[i].sb}`).join('、');
  return { actions, strengths };
}

shareFB.addEventListener('click', () => {
  const url = encodeURIComponent(location.href);
  window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
});

shareLINE.addEventListener('click', () => {
  const { actions, strengths } = getShareText();
  const text = `我在「報稅理財優勢賓果」選了 ${selected.size} 個行為！\n\n${actions}\n\n我的優勢包含：${strengths}\n\n來玩看看你是哪種人 👉 ${location.href}`;
  window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(location.href)}&text=${encodeURIComponent(text)}`, '_blank');
});

shareIG.addEventListener('click', () => {
  const { actions, strengths } = getShareText();
  const text = `我在「報稅理財優勢賓果」選了 ${selected.size} 個行為！\n\n${actions}\n\n我的優勢包含：${strengths}\n\n來玩看看你是哪種人 👉 ${location.href}`;
  navigator.clipboard.writeText(text).then(() => {
    igCopied.style.display = 'block';
    setTimeout(() => { igCopied.style.display = 'none'; }, 4000);
    if (/iPhone|iPad|Android/i.test(navigator.userAgent)) {
      setTimeout(() => { window.location.href = 'instagram://'; }, 500);
    }
  });
});

resetBtn.addEventListener('click', () => {
  phase = 'select';
  selected = new Set();
  flipped = new Set();
  phaseText.textContent = '選取中：點格子圈選符合自己的行為';
  phaseIcon.textContent = '1';
  phaseIcon.classList.remove('active-flip');
  confirmBtn.textContent = '確認選擇 →';
  hint.textContent = '點選格子，圈起符合你的行為；確認後翻牌看看你的優勢';
  countLabel.textContent = '已選 0 格';
  shareArea.style.display = 'none';
  buildGrid();
});

buildGrid();
</script>
</body>
</html>
